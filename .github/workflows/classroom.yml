name: GitHub Classroom Workflow - Week10
on:
  push:
    paths:
      - 'chapter10/**'
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  build:
    name: Autograding Week10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: week10-01-localvar
        id: week10-01-localvar
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week10-01-localvar
          setup-command: gcc chapter10/01localvar.c -o w1001
          command: ./w1001
          input: ""
          expected-output: "20 100"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week10-02-global
        id: week10-02-global
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week10-02-global
          setup-command: gcc chapter10/02-1global.c chapter10/02-2circumference.c -o w1002
          command: ./w1002
          input: ""
          expected-output: "gi: 0"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week10-03-regvar
        id: week10-03-regvar
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week10-03-regvar
          setup-command: gcc chapter10/03regvar.c -o w1003
          command: ./w1003
          input: "10"
          expected-output: "합: 55"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week10-04-slocal
        id: week10-04-slocal
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week10-04-slocal
          setup-command: gcc chapter10/04slocal.c -o w1004
          command: ./w1004
          input: ""
          expected-output: "정적 지역변수 s: 14"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week10-05-sgvar
        id: week10-05-sgvar
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week10-05-sgvar
          setup-command: gcc chapter10/05-1sgvar.c chapter10/05-2gfun.c -o w1005
          command: ./w1005
          input: ""
          expected-output: "전역 변수: 30"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week10-06-sclass
        id: week10-06-sclass
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week10-06-sclass
          setup-command: gcc chapter10/06-1sclass.c chapter10/06-2out.c -o w1006
          command: ./w1006
          input: ""
          expected-output: "16 23 100"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week10-lab2-svar
        id: week10-lab2-svar
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week10-lab2-svar
          setup-command: gcc chapter10/lab2svar.c -o w10lab2
          command: ./w10lab2
          input: ""
          expected-output: "1 10"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week10-lab3-bank
        id: week10-lab3-bank
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week10-lab3-bank
          setup-command: gcc chapter10/lab3bank.c -o w10lab3
          command: ./w10lab3
          input: ""
          expected-output: "70000"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        continue-on-error: true
        env:
          WEEK10-01-LOCALVAR_RESULTS: "${{steps.week10-01-localvar.outputs.result}}"
          WEEK10-02-GLOBAL_RESULTS: "${{steps.week10-02-global.outputs.result}}"
          WEEK10-03-REGVAR_RESULTS: "${{steps.week10-03-regvar.outputs.result}}"
          WEEK10-04-SLOCAL_RESULTS: "${{steps.week10-04-slocal.outputs.result}}"
          WEEK10-05-SGVAR_RESULTS: "${{steps.week10-05-sgvar.outputs.result}}"
          WEEK10-06-SCLASS_RESULTS: "${{steps.week10-06-sclass.outputs.result}}"
          WEEK10-LAB2-SVAR_RESULTS: "${{steps.week10-lab2-svar.outputs.result}}"
          WEEK10-LAB3-BANK_RESULTS: "${{steps.week10-lab3-bank.outputs.result}}"
        with:
          runners: week10-01-localvar,week10-02-global,week10-03-regvar,week10-04-slocal,week10-05-sgvar,week10-06-sclass,week10-lab2-svar,week10-lab3-bank
