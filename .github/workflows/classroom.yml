name: GitHub Classroom Workflow
on:
  push:
    paths:
      - 'week06/**'
      - 'week07/**'
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: week06-01-basicif
        id: week06-01-basicif
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-01-basicif
          setup-command: gcc week06/01basicif.c -o w601
          command: ./w601
          input: "33.0"
          expected-output: "폭염 주의보를 발령합니다."
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-02-evenifelse
        id: week06-02-evenifelse
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-02-evenifelse
          setup-command: gcc week06/02evenifelse_fixed.c -o w602
          command: ./w602
          input: "4"
          expected-output: "짝수"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-03-addsub
        id: week06-03-addsub
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-03-addsub
          setup-command: gcc week06/03addsub.c -o w603
          command: ./w603
          input: "3.5"
          expected-output: "우수"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-04-nestedif
        id: week06-04-nestedif
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-04-nestedif
          setup-command: gcc week06/04nestedif.c -o w604
          command: ./w604
          input: |-
            1
            75
          expected-output: "1종면허 합격"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-05-ageifelse
        id: week06-05-ageifelse
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-05-ageifelse
          setup-command: gcc week06/05ageifelse.c -o w605
          command: ./w605
          input: "25"
          expected-output: "당신은 성인입니다."
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-06-arithswitch
        id: week06-06-arithswitch
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-06-arithswitch
          setup-command: gcc week06/06arithswitch.c -o w606
          command: ./w606
          input: |-
            3.0 4.0
            1
          expected-output: "3.00 + 4.00 = 7.00"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-07-seasonswitch
        id: week06-07-seasonswitch
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-07-seasonswitch
          setup-command: gcc week06/07seasonswitch.c -o w607
          command: ./w607
          input: "7"
          expected-output: "여름입니다."
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-08-scoreswitch
        id: week06-08-scoreswitch
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-08-scoreswitch
          setup-command: gcc week06/08scoreswitch.c -o w608
          command: ./w608
          input: "5 3"
          expected-output: "최대값: 5"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-09-scoreswitch2
        id: week06-09-scoreswitch2
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-09-scoreswitch2
          setup-command: gcc week06/09scoreswitch2.c -o w609
          command: ./w609
          input: "85"
          expected-output: "성적이 B 입니다."
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-lab1-pay
        id: week06-lab1-pay
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-lab1-pay
          setup-command: gcc week06/lab1pay.c -o w6lab1
          command: ./w6lab1
          input: "3 7 5"
          expected-output: "최대 수: 7"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week06-lab2-shapeswitch
        id: week06-lab2-shapeswitch
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week06-lab2-shapeswitch
          setup-command: gcc week06/lab2shapeswitch.c -o w6lab2
          command: ./w6lab2
          input: |-
            1
            3.0 4.0
          expected-output: "삼각형 면적: 6.00"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-01-whilebasic
        id: week07-01-whilebasic
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-01-whilebasic
          setup-command: gcc week07/03whilebasic.c -o w701
          command: ./w701
          input: ""
          expected-output: "반복, 재미있네요!"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-02-dowhile
        id: week07-02-dowhile
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-02-dowhile
          setup-command: gcc week07/05dowhile.c -o w702
          command: ./w702
          input: "0"
          expected-output: "[0]종료"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-03-forbasic
        id: week07-03-forbasic
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-03-forbasic
          setup-command: gcc week07/06forbasic.c -o w703
          command: ./w703
          input: ""
          expected-output: "for 종료 이후 i => 6"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-04-break
        id: week07-04-break
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-04-break
          setup-command: gcc week07/11break.c -o w704
          command: ./w704
          input: "0"
          expected-output: "종료"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-05-continue
        id: week07-05-continue
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-05-continue
          setup-command: gcc week07/12continue.c -o w705
          command: ./w705
          input: ""
          expected-output: "3으로 나누어 떨어지지 않는 수"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-06-goto
        id: week07-06-goto
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-06-goto
          setup-command: gcc week07/13goto.c -o w706
          command: ./w706
          input: ""
          expected-output: "종료"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-07-triangle
        id: week07-07-triangle
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-07-triangle
          setup-command: gcc week07/16triangle.c -o w707
          command: ./w707
          input: ""
          expected-output: "*****"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-lab1-max
        id: week07-lab1-max
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-lab1-max
          setup-command: gcc week07/lab1max.c -o w7lab1
          command: ./w7lab1
          input: |-
            120
            125
            110
            130
          expected-output: "정원 4명 완료!"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-lab2-digit
        id: week07-lab2-digit
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-lab2-digit
          setup-command: gcc week07/lab2digit.c -o w7lab2
          command: ./w7lab2
          input: "123"
          expected-output: "100단위 출력: 1"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-lab3-primebreak
        id: week07-lab3-primebreak
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-lab3-primebreak
          setup-command: gcc week07/lab3primebreak.c -o w7lab3
          command: ./w7lab3
          input: "7"
          expected-output: "7 소수이다."
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: week07-lab4-mtable
        id: week07-lab4-mtable
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week07-lab4-mtable
          setup-command: gcc week07/lab4mtable.c -o w7lab4
          command: ./w7lab4
          input: ""
          expected-output: "2단 출력"
          comparison-method: contains
          timeout: 10
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        continue-on-error: true
        env:
          WEEK06-01-BASICIF_RESULTS: "${{steps.week06-01-basicif.outputs.result}}"
          WEEK06-02-EVENIFELSE_RESULTS: "${{steps.week06-02-evenifelse.outputs.result}}"
          WEEK06-03-ADDSUB_RESULTS: "${{steps.week06-03-addsub.outputs.result}}"
          WEEK06-04-NESTEDIF_RESULTS: "${{steps.week06-04-nestedif.outputs.result}}"
          WEEK06-05-AGEIFELSE_RESULTS: "${{steps.week06-05-ageifelse.outputs.result}}"
          WEEK06-06-ARITHSWITCH_RESULTS: "${{steps.week06-06-arithswitch.outputs.result}}"
          WEEK06-07-SEASONSWITCH_RESULTS: "${{steps.week06-07-seasonswitch.outputs.result}}"
          WEEK06-08-SCORESWITCH_RESULTS: "${{steps.week06-08-scoreswitch.outputs.result}}"
          WEEK06-09-SCORESWITCH2_RESULTS: "${{steps.week06-09-scoreswitch2.outputs.result}}"
          WEEK06-LAB1-PAY_RESULTS: "${{steps.week06-lab1-pay.outputs.result}}"
          WEEK06-LAB2-SHAPESWITCH_RESULTS: "${{steps.week06-lab2-shapeswitch.outputs.result}}"
          WEEK07-01-WHILEBASIC_RESULTS: "${{steps.week07-01-whilebasic.outputs.result}}"
          WEEK07-02-DOWHILE_RESULTS: "${{steps.week07-02-dowhile.outputs.result}}"
          WEEK07-03-FORBASIC_RESULTS: "${{steps.week07-03-forbasic.outputs.result}}"
          WEEK07-04-BREAK_RESULTS: "${{steps.week07-04-break.outputs.result}}"
          WEEK07-05-CONTINUE_RESULTS: "${{steps.week07-05-continue.outputs.result}}"
          WEEK07-06-GOTO_RESULTS: "${{steps.week07-06-goto.outputs.result}}"
          WEEK07-07-TRIANGLE_RESULTS: "${{steps.week07-07-triangle.outputs.result}}"
          WEEK07-LAB1-MAX_RESULTS: "${{steps.week07-lab1-max.outputs.result}}"
          WEEK07-LAB2-DIGIT_RESULTS: "${{steps.week07-lab2-digit.outputs.result}}"
          WEEK07-LAB3-PRIMEBREAK_RESULTS: "${{steps.week07-lab3-primebreak.outputs.result}}"
          WEEK07-LAB4-MTABLE_RESULTS: "${{steps.week07-lab4-mtable.outputs.result}}"
        with:
          runners: week06-01-basicif,week06-02-evenifelse,week06-03-addsub,week06-04-nestedif,week06-05-ageifelse,week06-06-arithswitch,week06-07-seasonswitch,week06-08-scoreswitch,week06-09-scoreswitch2,week06-lab1-pay,week06-lab2-shapeswitch,week07-01-whilebasic,week07-02-dowhile,week07-03-forbasic,week07-04-break,week07-05-continue,week07-06-goto,week07-07-triangle,week07-lab1-max,week07-lab2-digit,week07-lab3-primebreak,week07-lab4-mtable
