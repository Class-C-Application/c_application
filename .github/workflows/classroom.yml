name: GitHub Classroom Workflow

on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1번 테스트: Hello World
      - name: week01-01-hello
        id: week01-01-hello
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week01-01-hello
          setup-command: gcc week01/01hello.c -o t1
          command: ./t1
          input: ""
          expected-output: "hello, world"
          comparison-method: contains
          timeout: 10
          max-score: 10

      # 2번 테스트: Put (여러 줄 출력)
      - name: week01-02-put
        id: week01-02-put
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week01-02-put
          setup-command: gcc week01/02put.c -o t2
          command: ./t2
          input: ""
          expected-output: |-
            hello, world
            C 언어, 재미있다!
          comparison-method: contains
          timeout: 10
          max-score: 10

      # 3번 테스트: Debug (오타 수정)
      - name: week01-03-debug
        id: week01-03-debug
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: week01-03-debug
          setup-command: gcc week01/03debug.c -o t3
          command: ./t3
          input: ""
          expected-output: |-
            컴퓨터공학과 학생이며
            C 프로그래밍 언어를 수강합니다.
          comparison-method: contains
          timeout: 10
          max-score: 10

      # 최종 점수 합산 및 리포트 출력
      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          WEEK01-01-HELLO_RESULTS: "${{steps.week01-01-hello.outputs.result}}"
          WEEK01-02-PUT_RESULTS: "${{steps.week01-02-put.outputs.result}}"
          WEEK01-03-DEBUG_RESULTS: "${{steps.week01-03-debug.outputs.result}}"
        with:
          runners: week01-01-hello,week01-02-put,week01-03-debug